const tagLabels = {
  epigenetic: "Epigenetic",
  structural: "Chromatin structural",
  metabolic: "Metabolic",
  signaling: "Signaling",
  rna: "RNA / non-coding",
  protein: "Protein targeting"
};

function tagClass(t) {
  return `tag tag-${t}`;
}

function renderCards(filter) {
  const grid = document.getElementById('mol-grid');
  const countEl = document.getElementById('count-label');
  const filtered = filter === 'all' ? molecules : molecules.filter(m => m.tags.includes(filter));
  countEl.textContent = `Showing ${filtered.length} molecule${filtered.length !== 1 ? 's' : ''} — click any to expand`;
  grid.innerHTML = filtered.map(m => `
    <div class="mol-card" data-id="${m.n}" onclick="toggleCard(${m.n})">
      <div class="mol-header">
        <div class="mol-number">${m.n < 10 ? '0' + m.n : m.n}</div>
        <div class="mol-main">
          <div class="mol-name">${m.name}</div>
          <div class="mol-tagline">${m.tagline}</div>
          <div class="mol-tags">
            ${m.tags.map(t => `<span class="${tagClass(t)}">${tagLabels[t]}</span>`).join('')}
          </div>
        </div>
        <div class="mol-chevron">⌄</div>
      </div>
      <div class="mol-detail">
        <div class="detail-section">
          <div class="detail-label">Class</div>
          <div class="detail-text">${m.class}</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">Primary target</div>
          <div class="detail-text">${m.target}</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">Mechanisms</div>
          <div class="mechanism-row">${m.mechanism.map(x => `<span class="mech-pill">${x}</span>`).join('')}</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">Design rationale</div>
          <div class="detail-text">${m.design}</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">Experimental test</div>
          <div class="detail-text">${m.testable}</div>
        </div>
        <div class="novelty-bar">
          <div class="detail-label">Conceptual novelty estimate: ${m.novelty}%</div>
          <div class="novelty-track"><div class="novelty-fill" style="width:${m.novelty}%"></div></div>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleCard(id) {
  const card = document.querySelector(`[data-id="${id}"]`);
  card.classList.toggle('open');
}

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(btn.dataset.filter);
});

renderCards('all');
</script>
