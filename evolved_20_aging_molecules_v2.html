const tagMap={epigenetic:"Epigenetic",structural:"Structural",metabolic:"Metabolic",signaling:"Signaling",rna:"RNA",protein:"Protein"};
const pillMap={epigenetic:"pe",structural:"ps",metabolic:"pm",signaling:"psi",rna:"pr",protein:"ppt"};

function render(f){
  const filtered=f==="all"?M:M.filter(m=>m.tags.includes(f));
  document.getElementById("ctr").textContent=filtered.length+" molecule"+(filtered.length!==1?"s":"");
  document.getElementById("grid").innerHTML=filtered.map(m=>`
<div class="card" id="c${m.n}" onclick="tog(${m.n})">
<div class="ch">
<div class="cn">${m.n<10?"0"+m.n:m.n}</div>
<div class="cm">
<div class="ct">${m.name}</div>
<div class="cs">${m.short}</div>
<div class="cp">${m.tags.map(t=>`<span class="p ${pillMap[t]}">${tagMap[t]}</span>`).join("")}</div>
</div>
<div class="cchev">⌄</div>
</div>
<div class="body">
<div class="bl">Class</div><div class="bt">${m.class}</div>
<div class="bl">Primary target</div><div class="bt">${m.target}</div>
<div class="bl">Atomic-level contacts</div><div class="bt">${m.atomic}</div>
<div class="delta">
<div class="bl">What evolved from generation 1</div>
<div class="bt">${m.evolution}</div>
</div>
<div class="bl">Delivery strategy</div><div class="bt">${m.delivery}</div>
<div class="bl">Intermediate biomarker (falsifiable checkpoint)</div><div class="bt">${m.biomarker}</div>
<div class="bl">Experimental protocol</div><div class="bt">${m.test}</div>
<div class="bl">Falsification criterion</div><div class="bt">${m.falsify}</div>
</div>
</div>`).join("");
}

function tog(n){
  const c=document.getElementById("c"+n);
  c.classList.toggle("open");
}

document.getElementById("tb").addEventListener("click",e=>{
  const b=e.target.closest(".fbtn");
  if(!b)return;
  document.querySelectorAll(".fbtn").forEach(x=>x.classList.remove("on"));
  b.classList.add("on");
  render(b.dataset.f);
});

render("all");
</script>
